name: Generate DORA Quarterly Report (PDF)

on:
  schedule:
    # Runs at 09:00 UTC on the 1st of January, April, July, and October
    - cron: '0 9 1 1,4,7,10 *'
  workflow_dispatch: # Allows you to manually trigger it anytime

permissions:
  contents: write # Required to allow the Action to commit the file to your repo

jobs:
  generate-and-store-pdf:
    runs-on: upptime-report
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PDF Library
        run: pip install fpdf2

      - name: Parse Upptime Data and Generate PDF
        run: |
          python -c '
          import json, glob, os, datetime
          from fpdf import FPDF

          # Determine Current Year and Quarter
          today = datetime.date.today()
          quarter = (today.month - 1) // 3 + 1
          if today.month in [1, 4, 7, 10]:
              report_year = today.year if today.month != 1 else today.year - 1
              report_quarter = 4 if today.month == 1 else quarter - 1
          else:
              report_year, report_quarter = today.year, quarter

          # Define the PDF Layout and Styling
          class PDF(FPDF):
              def header(self):
                  # Logo could be added here: self.image("logo.png", 10, 8, 33)
                  self.set_font("helvetica", "B", 16)
                  self.set_text_color(0, 51, 102) # Professional Dark Blue
                  self.cell(0, 10, "DORA Quarterly Service Performance Summary", align="C", new_x="LMARGIN", new_y="NEXT")
                  self.set_font("helvetica", "I", 11)
                  self.set_text_color(100, 100, 100)
                  self.cell(0, 10, f"Reporting Period: {report_year} Q{report_quarter}", align="C", new_x="LMARGIN", new_y="NEXT")
                  self.ln(10)

              def footer(self):
                  self.set_y(-15)
                  self.set_font("helvetica", "I", 8)
                  self.set_text_color(150, 150, 150)
                  self.cell(0, 10, f"Page {self.page_no()}", align="C")

          # Initialize PDF
          pdf = PDF()
          pdf.add_page()

          # Introductory Text
          pdf.set_font("helvetica", "", 11)
          pdf.set_text_color(0, 0, 0)
          intro = (
              "This document contains your periodic continuous monitoring and SLA performance metrics. "
              "It is provided by Anduin Transactions Inc to support your Third-Party Risk Management (TPRM) "
              "and regulatory compliance requirements under the EU Digital Operational Resilience Act (DORA)."
          )
          pdf.multi_cell(0, 6, intro)
          pdf.ln(10)

          # Draw Table Header
          pdf.set_font("helvetica", "B", 12)
          pdf.set_fill_color(240, 240, 240) # Light grey background
          pdf.cell(110, 10, " Service / Component", border=1, fill=True)
          pdf.cell(80, 10, " Uptime (%)", border=1, fill=True, new_x="LMARGIN", new_y="NEXT")

          # Extract Data and Populate Table Rows
          pdf.set_font("helvetica", "", 11)
          sites = glob.glob("api/*/uptime.json")

          if not sites:
              pdf.cell(190, 10, " No uptime data found. Check Upptime data.", border=1, new_x="LMARGIN", new_y="NEXT")
          else:
              for site_path in sites:
                  site_slug = site_path.split("/")[1].replace("-", " ").title()
                  with open(site_path, "r") as f:
                      try:
                          data = json.load(f)
                          uptime = data.get("message", "Unknown")
                      except:
                          uptime = "Error"

                  pdf.cell(110, 10, f" {site_slug}", border=1)
                  pdf.cell(80, 10, f" {uptime}", border=1, new_x="LMARGIN", new_y="NEXT")

          pdf.ln(15)
          pdf.set_font("helvetica", "I", 10)
          pdf.set_text_color(100, 100, 100)
          pdf.cell(0, 10, "Generated automatically by Anduin Transactions Inc Infrastructure Systems.", new_x="LMARGIN", new_y="NEXT")

          # Save PDF to folder
          os.makedirs("dora-reports", exist_ok=True)
          filename = f"dora-reports/DORA-Report-{report_year}-Q{report_quarter}.pdf"
          pdf.output(filename)

          print(f"Successfully generated business-friendly PDF: {filename}")
          '

      - name: Commit and Push PDF to Repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Add Quarterly DORA Performance PDF Report"
          branch: main # Change this to 'master' if your default branch is named master
          file_pattern: 'dora-reports/*.pdf'
